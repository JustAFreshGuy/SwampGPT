<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwampGPT 1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>SwampGPT <span class="version">1.0</span></h1>
            <p class="creators">Created by <strong>JustAFreshGuy</strong> & <strong>JustACuler</strong></p>
        </header>

        <div id="chat-box">
            <div class="msg bot"><b>SwampGPT:</b> Welcome to the swamp. How can I help you today?</div>
        </div>

        <div class="input-group">
            <input type="text" id="user-input" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" id="send-btn">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const sendBtn = document.getElementById('send-btn');
            const message = input.value.trim();
            
            if (!message) return;

            // 1. Show your message in the chat
            box.innerHTML += `<div class="msg user"><b>You:</b> ${message}</div>`;
            input.value = '';
            sendBtn.disabled = true; // Prevent double-clicking
            box.scrollTop = box.scrollHeight;

            try {
                // 2. Send the message to your Node.js server
                // Note: No port needed here because it uses the same origin
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();

                // 3. Show SwampGPT's response
                box.innerHTML += `<div class="msg bot"><b>SwampGPT:</b> ${data.reply}</div>`;
            } catch (err) {
                box.innerHTML += `<div class="msg error"><b>Error:</b> The swamp is too murky to respond.</div>`;
            } finally {
                sendBtn.disabled = false;
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>
</body>
</html>
